[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

# ── Pretty URLs ──────────────────────────────────────────────────
# Hide the .html suffix from URLs. Visiting /bookings serves bookings.html, etc.
# Direct hits to /index.html, /bookings.html etc. are 301-redirected to the
# canonical extension-less path.

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/bookings.html"
  to = "/bookings"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard"
  status = 301
  force = true

[[redirects]]
  from = "/package.html"
  to = "/package"
  status = 301
  force = true

# Map clean URLs back to the static files (rewrite, not redirect, status 200).
[[redirects]]
  from = "/bookings"
  to = "/bookings.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/package"
  to = "/package.html"
  status = 200


[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301
  force = true

[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301
  force = true

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200


[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://tp.media https://tpwgts.com https://tpemd.com https://emrldtp.com; script-src-attr 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://tp.media https://tpwgts.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://api.razorpay.com https://lumberjack.razorpay.com https://tp.media https://tpwgts.com https://tpemd.com https://emrldtp.com https://www.travelpayouts.com; frame-src https://api.razorpay.com https://checkout.razorpay.com https://tp.media https://tpwgts.com https://www.travelpayouts.com https://www.skyscanner.com https://www.skyscanner.co.in; object-src 'none';"

# Force ads.txt to be served as plain text + always-fresh, so AdSense's
# Mediapartners-Google / AdsBot can find it on every crawl.
[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"

# Same for robots.txt and sitemap.xml — fast fresh fetches for crawlers.
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, X-Admin-Token"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
