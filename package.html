// ── Load package via the shared PackagesStore (jsonbin → repo → defaults) ─
async function loadPackage() {
    const params = new URLSearchParams(window.location.search);
    const pkgId = params.get('id') || 'budget';

    let packages = null;
    if (window.PackagesStore) {
        const result = await window.PackagesStore.load();
        packages = result.data;
    }
    if (!Array.isArray(packages) || !packages.length) {
        packages = HARDCODED_PACKAGES;
    }
    window._packages = packages;
    currentPkg = packages.find(p => p.id === pkgId);

    if (!currentPkg) {
        document.getElementById('pageContent').innerHTML = `
            <div class="pkg-loading" style="padding-top:6rem;">
                <i class="fas fa-exclamation-circle" style="color:#e74c3c;"></i>
                <p>Package not found. <a href="index.html#packages">Browse all packages</a></p>
            </div>`;
        return;
    }

    currentBasePrice = currentPkg.price;

    // Merge with itinerary defaults
    const defaults = ITINERARY_DEFAULTS[pkgId] || ITINERARY_DEFAULTS['budget'];
    const pkg = {
        duration:    currentPkg.duration    || defaults.duration,
        highlights:  currentPkg.highlights  || defaults.highlights,
        images:      currentPkg.images      || defaults.images,
        days:        currentPkg.days        || defaults.days,
        inclusions:  currentPkg.inclusions  || defaults.inclusions,
        exclusions:  currentPkg.exclusions  || defaults.exclusions,
        ...currentPkg
    };

    document.title = pkg.name + ' – Bharat Tours & Travels';
    injectDynamicSEO(pkg);
    renderPage(pkg);

    // Load site settings (payments toggle) so the modal & guards know.
    if (window.SettingsStore && typeof window.SettingsStore.load === 'function') {
        const cached = window.SettingsStore.cached && window.SettingsStore.cached();
        if (cached) window._siteSettings = cached;
        window.SettingsStore.load().then(s => {
            window._siteSettings = s || window._siteSettings;
            // If payments are off, soften the modal CTA label too
            const cb = document.getElementById('confirmBookingBtn');
            if (cb && !arePaymentsEnabled()) {
                cb.innerHTML = '<i class="fas fa-phone-alt"></i> Call to Book — Payments Disabled';
            }
        }).catch(() => {});
    }
}

// ── Inject per-package dynamic SEO + TouristTrip structured data ─
function injectDynamicSEO(pkg) {
    const url = 'https://andamanvoyages.in/package.html?id=' + encodeURIComponent(pkg.id);
    const img = pkg.image ? ('https://andamanvoyages.in/' + pkg.image.replace(/^\/+/, '')) : 'https://andamanvoyages.in/images/beach1.jpg';
    const desc = (pkg.desc || ('Andaman tour package: ' + pkg.name + '. Hotels, ferries and activities included. Book now from ₹' + Number(pkg.price).toLocaleString() + '.')).slice(0, 300);
    const setMeta = (selector, attr, val) => {
        let el = document.head.querySelector(selector);
        if (el) el.setAttribute(attr, val);
    };

    // Update <title>, <meta description>, canonical, OG and Twitter tags
    setMeta('meta[name="description"]', 'content', desc);
    setMeta('link[rel="canonical"]', 'href', url);

    setMeta('meta[property="og:url"]', 'content', url);
    setMeta('meta[property="og:title"]', 'content', pkg.name + ' | Bharat Tours & Travels');
    setMeta('meta[property="og:description"]', 'content', desc);
    setMeta('meta[property="og:image"]', 'content', img);

    setMeta('meta[name="twitter:title"]', 'content', pkg.name + ' | Bharat Tours & Travels');
    setMeta('meta[name="twitter:description"]', 'content', desc);
    setMeta('meta[name="twitter:image"]', 'content', img);

    // Inject TouristTrip / Product Offer JSON-LD
    const trip = {
        "@context": "https://schema.org",
        "@type": "TouristTrip",
        "name": pkg.name,
        "description": desc,
        "image": img,
        "url": url,
        "touristType": pkg.id === 'honeymoon' ? "Couples / Honeymoon" : "Leisure travelers",
        "itinerary": (pkg.days || []).map(d => ({
            "@type": "TouristAttraction",
            "name": "Day " + d.day + ": " + d.title,
            "description": d.desc || ''
        })),
        "offers": {
            "@type": "Offer",
            "price": String(pkg.price),
            "priceCurrency": "INR",
            "availability": "https://schema.org/InStock",
            "url": url,
            "validFrom": new Date().toISOString().split('T')[0]
        },
        "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": String(Number(pkg.rating).toFixed(1)),
            "bestRating": "5",
            "ratingCount": "120"
        },
        "provider": {
            "@type": "TravelAgency",
            "name": "Bharat Tours and Travels",
            "url": "https://andamanvoyages.in/"
        }
    };

    // Remove old dynamic block if any (for SPA-like navigation)
    const old = document.getElementById('dynamic-trip-schema');
    if (old) old.remove();
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.id = 'dynamic-trip-schema';
    script.textContent = JSON.stringify(trip);
    document.head.appendChild(script);
}

function openImgLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    lb.style.display = 'flex';
}

// ── Site-settings cache + helpers (mirror js/script.js) ──────
window._siteSettings = { paymentsEnabled: true, paymentsDisabledMessage: '' };

function arePaymentsEnabled() {
    return window._siteSettings && window._siteSettings.paymentsEnabled !== false;
}
function showPaymentsDisabledAlert() {
    const msg = (window._siteSettings && window._siteSettings.paymentsDisabledMessage)
        ? window._siteSettings.paymentsDisabledMessage
        : 'Online payments are temporarily unavailable.\n\nTo book this package, please call or WhatsApp us:\n\n📞 +91 88801 95191\n📞 +91 94341 25698\n\nOr email: booking@andamanvoyages.in\n\nWe\'ll confirm your booking and arrange a payment link / bank transfer.';
    alert('🛎️ ' + msg);
}
function showSoldOutAlert(pkgName) {
    alert(
        '⚠️ "' + pkgName + '" is currently SOLD OUT.\n\n' +
        'Drop us a line to be notified when this package is available again, ' +
        'or to ask about similar packages with open dates:\n\n' +
        '📞 +91 88801 95191 / +91 94341 25698\n' +
        '📧 booking@andamanvoyages.in'
    );
}

// 🔒 Login-required helpers
// Cache live Firebase auth instance for synchronous checks at click time.
window.__authInstance = null;
if (window.__firebaseReady && typeof window.__firebaseReady.then === 'function') {
    window.__firebaseReady.then(({ auth }) => { window.__authInstance = auth; })
        .catch(() => { /* localStorage fallback */ });
}
function isUserLoggedIn() {
    // 1) Live Firebase Auth (modular SDK v9+) – authoritative source of truth
    if (window.__authInstance) {
        const u = window.__authInstance.currentUser;
        return !!(u && u.uid);
    }
    // 2) Fallback while Firebase is still booting: cached profile from auth.js
    try {
        const cu = JSON.parse(localStorage.getItem('currentUser') || 'null');
        return !!(cu && (cu.uid || cu.id));
    } catch (e) { return false; }
}
function requireLoginForBooking() {
    if (isUserLoggedIn()) return true;
    try {
        sessionStorage.setItem('postLoginIntent', JSON.stringify({
            type: 'book',
            pkg: currentPkg ? currentPkg.id : null,
            url: window.location.href,
            ts: Date.now()
        }));
    } catch (e) {}
    // Silently redirect to home page where the login modal will auto-open.
    // No browser alert — the login modal is the prompt.
    window.location.href = 'index.html#login';
    return false;
}

function bookNow() {
    if (!currentPkg) return;
    if (currentPkg.soldOut === true) { showSoldOutAlert(currentPkg.name); return; }
    if (!arePaymentsEnabled()) { showPaymentsDisabledAlert(); return; }
    // 🔒 Require login before opening the payment modal
    if (!requireLoginForBooking()) return;
    const price = currentPkg.price;
    document.getElementById('finalAmount').textContent = '₹' + Number(price).toLocaleString();
    document.getElementById('bookingDetails').textContent = 'Package: ' + currentPkg.name;
    window.currentPackage = currentPkg.id;
    window.currentBasePrice = price;
    document.getElementById('paymentModal').style.display = 'block';
}

function customizeNow() {
    if (!currentPkg) return;
    if (currentPkg.soldOut === true) { showSoldOutAlert(currentPkg.name); return; }
    // 🔒 Require login before customizing (so we don't lose the changes if they aren't logged in)
    if (!requireLoginForBooking()) return;
    document.getElementById('modalTitle').textContent = 'Customize ' + currentPkg.name;
    window.currentPackage = currentPkg.id;
    window.currentBasePrice = currentPkg.price;
    updateTotal();
    document.getElementById('customizeModal').style.display = 'block';
}

function updateTotal() {
    let total = window.currentBasePrice || 0;
    document.querySelectorAll('#customForm input[type="checkbox"]').forEach(cb => {
        if (cb.checked) total += parseInt(cb.value);
    });
    document.getElementById('totalPrice').textContent = 'Total: ₹' + total.toLocaleString();
}

function proceedToPayment() {
    const totalStr = document.getElementById('totalPrice').textContent.match(/₹([\d,]+)/)[1].replace(/,/g,'');
    document.getElementById('finalAmount').textContent = '₹' + Number(totalStr).toLocaleString();
    document.getElementById('bookingDetails').textContent = 'Package: ' + currentPkg.name + ' | ' + document.getElementById('duration').value;
    document.getElementById('customizeModal').style.display = 'none';
    document.getElementById('paymentModal').style.display = 'block';
}

window.confirmBooking = async function() {
    // Defence-in-depth: never let the Pay Now button take a payment for a
    // sold-out package or while the admin has paused payments site-wide.
    if (currentPkg && currentPkg.soldOut === true) {
        const pm = document.getElementById('paymentModal');
        if (pm) pm.style.display = 'none';
        showSoldOutAlert(currentPkg.name);
        return;
    }
    if (!arePaymentsEnabled()) {
        const pm = document.getElementById('paymentModal');
        if (pm) pm.style.display = 'none';
        showPaymentsDisabledAlert();
        return;
    }
    // 🔒 Final defence: never let the Pay Now button complete without an authenticated user
    if (!requireLoginForBooking()) {
        const pm = document.getElementById('paymentModal');
        if (pm) pm.style.display = 'none';
        return;
    }
    const priceStr = document.getElementById('finalAmount').textContent.replace(/[^0-9]/g,'');
    const price = parseFloat(priceStr);
    const currentUser = localStorage.getItem('currentUser');
    const options = {
        key: 'rzp_live_SLfG8nnKN3tXPC',
        amount: price * 100,
        currency: 'INR',
        name: 'Bharat Tours & Travels',
        description: currentPkg.name,
        handler: function(response) {
            // Save booking to localStorage
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            const user = currentUser ? JSON.parse(currentUser) : null;
            bookings.push({
                id: Date.now(),
                package_name: currentPkg.id,
                price,
                duration: document.getElementById('duration') ? document.getElementById('duration').value : currentPkg.duration,
                guests: '2 Adults',
                payment_id: response.razorpay_payment_id,
                status: 'confirmed',
                createdAt: new Date().toISOString(),
                userId: user ? user.id : 'guest'
            });
            localStorage.setItem('bookings', JSON.stringify(bookings));
            document.getElementById('paymentModal').style.display = 'none';
            alert('🎉 Booking Confirmed!\nPayment ID: ' + response.razorpay_payment_id + '\n\nThank you for choosing Bharat Tours & Travels!');
        },
        prefill: {
            name: currentUser ? JSON.parse(currentUser).username : 'Guest',
            email: currentUser ? JSON.parse(currentUser).email : '',
            contact: '8880195191'
        },
        theme: { color: '#1abc9c' }
    };
    if (typeof Razorpay === 'undefined') { alert('Payment system not loaded. Please refresh.'); return; }
    const rzp = new Razorpay(options);
    rzp.on('payment.failed', r => alert('Payment failed: ' + r.error.description));
    rzp.open();
};

// ── Auth nav link ────────────────────────────────────────────────
function updateNavAuth() {
    const link = document.getElementById('navAuthLink');
    const user = localStorage.getItem('currentUser');
    if (user && localStorage.getItem('token')) {
        const u = JSON.parse(user);
        link.textContent = u.username;
        link.href = 'index.html';
    }
}
updateNavAuth();

// Wire up static modal buttons and close handlers
// (Script is at bottom of body — DOM is already parsed, run immediately)
(function setupHandlers() {
    // data-close close buttons
    document.querySelectorAll('[data-close]').forEach(btn => {
        btn.addEventListener('click', () => {
            const m = document.getElementById(btn.dataset.close);
            if (m) m.style.display = 'none';
        });
    });

    // Pay Now button in payment modal
    const confirmBookingBtn = document.getElementById('confirmBookingBtn');
    if (confirmBookingBtn) confirmBookingBtn.addEventListener('click', window.confirmBooking);

    // Proceed to Payment button in customize modal
    const proceedPaymentBtn = document.getElementById('proceedPaymentBtn');
    if (proceedPaymentBtn) proceedPaymentBtn.addEventListener('click', proceedToPayment);

    // Close modals on outside click
    window.addEventListener('click', e => {
        ['paymentModal', 'customizeModal'].forEach(id => {
            const m = document.getElementById(id);
            if (e.target === m) m.style.display = 'none';
        });
    });

    // Customize form checkbox listeners
    document.addEventListener('change', e => {
        if (e.target.type === 'checkbox' && e.target.closest('#customForm')) updateTotal();
    });
})();

// Load on page ready
loadPackage();
</script>
