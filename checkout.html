<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Hide .html and /index from the URL bar without re-loading the page -->
    <script>(function(){try{var p=location.pathname;if(/\/index(\.html)?$/i.test(p)){history.replaceState(null,"",p.replace(/\/index(\.html)?$/i,"/")+location.search+location.hash);}else if(/\.html$/i.test(p)){history.replaceState(null,"",p.replace(/\.html$/i,"")+location.search+location.hash);}}catch(e){}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Bharat Tours &amp; Travels</title>
    <meta name="description" content="Review your Andaman tour booking, fill traveler details, apply coupons and pay securely with Razorpay.">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#0d7a8a">

    <link rel="icon" type="image/png" href="images/logo-white.png">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/checkout.css?v=3">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/firebase-config.js?v=18"></script>
    <script src="js/analytics.js?v=1"></script>
    <script src="js/dataStore.js?v=17"></script>
    <script src="js/toast.js?v=1"></script>
    <script src="js/travelpayouts-init.js?v=1"></script>
</head>
<body>

    <!-- Header -->
    <header class="co-header">
        <a href="/" style="display:flex;align-items:center;gap:.75rem;">
            <img src="images/logo-white.png" alt="Bharat Tours">
            <span style="font-weight:700;font-size:1rem;">Bharat Tours &amp; Travels</span>
        </a>
        <div style="display:flex;gap:1rem;align-items:center;">
            <a href="/#packages" class="home-link"><i class="fas fa-suitcase"></i> All Packages</a>
            <a href="/" id="navAuthLink" class="auth-link">Login</a>
        </div>
    </header>

    <!-- Stepper -->
    <div class="co-stepbar">
        <div class="co-step done"><span class="num"><i class="fas fa-check"></i></span> Choose Package</div>
        <span class="co-step-divider"><i class="fas fa-chevron-right"></i></span>
        <div class="co-step active"><span class="num">2</span> Review &amp; Details</div>
        <span class="co-step-divider"><i class="fas fa-chevron-right"></i></span>
        <div class="co-step"><span class="num">3</span> Payment</div>
        <span class="co-step-divider"><i class="fas fa-chevron-right"></i></span>
        <div class="co-step"><span class="num">4</span> Confirmation</div>
    </div>

    <main class="co-wrap" id="checkoutWrap">
        <div class="co-loading" style="grid-column:1/-1;">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading your cart…</p>
        </div>
    </main>

    <footer class="co-footer">
        © 2026 Bharat Tours and Travels &middot;
        <a href="/">Home</a> &middot;
        <a href="/#packages">Packages</a> &middot;
        <a href="/#contact">Contact</a> &middot;
        <a href="/privacy">Privacy</a> &middot;
        <a href="/terms">Terms</a>
    </footer>

    <script src="js/checkout.js?v=5"></script>
    <script src="js/security.js?v=2"></script>
    <script src="js/user-menu.js?v=6"></script>
</body>
</html>
