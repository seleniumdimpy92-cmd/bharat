<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Hide .html and /index from the URL bar without re-loading the page -->
    <script>(function(){try{var p=location.pathname;if(/\/index(\.html)?$/i.test(p)){history.replaceState(null,"",p.replace(/\/index(\.html)?$/i,"/")+location.search+location.hash);}else if(/\.html$/i.test(p)){history.replaceState(null,"",p.replace(/\.html$/i,"")+location.search+location.hash);}}catch(e){}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery — Andaman Tours | Bharat Tours &amp; Travels</title>

    <meta name="description" content="Browse stunning photos of Andaman: Radhanagar Beach, Havelock Island, Neil Island, scuba diving, Ross Island, sunsets, and more. Bharat Tours and Travels.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="theme-color" content="#0d7a8a">
    <link rel="canonical" href="https://andamanvoyages.in/gallery">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Photo Gallery — Andaman Tours | Bharat Tours &amp; Travels">
    <meta property="og:description" content="Stunning photos of Andaman beaches, islands, scuba diving, and tours.">
    <meta property="og:url" content="https://andamanvoyages.in/gallery">
    <meta property="og:image" content="https://andamanvoyages.in/images/beach1.jpg">

    <link rel="icon" type="image/png" href="images/logo-white.png">
    <link rel="apple-touch-icon" href="images/logo-white.png">

    <!-- Schema.org: ImageGallery + BreadcrumbList -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ImageGallery",
        "name": "Andaman Photo Gallery",
        "description": "Travel photos from Andaman tours by Bharat Tours and Travels — Radhanagar Beach, Havelock Island, Neil Island, scuba diving, Ross Island, sunsets and more.",
        "url": "https://andamanvoyages.in/gallery",
        "publisher": {
            "@type": "TravelAgency",
            "name": "Bharat Tours and Travels",
            "url": "https://andamanvoyages.in/",
            "logo": "https://andamanvoyages.in/images/logo-white.png"
        }
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://andamanvoyages.in/" },
            { "@type": "ListItem", "position": 2, "name": "Photo Gallery", "item": "https://andamanvoyages.in/gallery" }
        ]
    }
    </script>

    <link rel="stylesheet" href="css/style.css?v=42">
    <link rel="stylesheet" href="css/gallery.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="js/firebase-config.js?v=18"></script>
    <script src="js/analytics.js?v=1"></script>
    <script src="js/travelpayouts-init.js?v=1"></script>
</head>
<body class="hero-page">
    <!-- ── Top Brand Bar ───────────────────────────────────── -->
    <header class="topbar">
        <a href="/" class="topbar-logo">
            <img src="images/logo-white.png" alt="Bharat Tours and Travels logo">
            <span class="brand-text"><span class="brand-line1">Bharat Tours</span><span class="brand-line2">&amp; Travels</span></span>
        </a>
        <nav class="topnav" id="topnav">
            <a href="/" class="topnav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/#packages" class="topnav-item"><i class="fas fa-suitcase-rolling"></i><span>Packages</span></a>
            <a href="/gallery" class="topnav-item active"><i class="fas fa-images"></i><span>Gallery</span></a>
            <a href="/about" class="topnav-item"><i class="fas fa-info-circle"></i><span>About</span></a>
            <a href="/bookings" class="topnav-item"><i class="fas fa-calendar-check"></i><span>Bookings</span></a>
            <a href="/#contact" class="topnav-item"><i class="fas fa-phone-alt"></i><span>Contact</span></a>
        </nav>
        <div class="topbar-contact"><a href="tel:+918880195191" class="topbar-phone"><i class="fas fa-phone-alt"></i> <span>+91 88801 95191</span></a><a href="mailto:booking@andamanvoyages.in" class="topbar-email" title="Email us to book"><i class="fas fa-envelope"></i> <span>booking@andamanvoyages.in</span></a></div>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="main-content">

        <section class="gallery-hero">
            <h1><i class="fas fa-images"></i> Photo Gallery</h1>
            <p>A glimpse of Andaman through our travelers' lenses.</p>
        </section>

        <section class="gallery-wrap">
            <div class="gallery-filters" id="galleryFilters">
                <button class="gallery-chip active" data-cat="all">All</button>
            </div>

            <!-- Group + Sort controls -->
            <div class="gallery-controls" id="galleryControls">
                <div class="gallery-control">
                    <label for="groupBy"><i class="fas fa-layer-group"></i> Group by</label>
                    <select id="groupBy">
                        <option value="none">None</option>
                        <option value="year">Year</option>
                        <option value="month">Month</option>
                        <option value="place">Place</option>
                        <option value="package">Package</option>
                        <option value="category">Category</option>
                    </select>
                </div>
                <div class="gallery-control">
                    <label for="sortBy"><i class="fas fa-sort"></i> Sort by</label>
                    <select id="sortBy">
                        <option value="date_desc">Newest first (date)</option>
                        <option value="date_asc">Oldest first (date)</option>
                        <option value="title_asc">Title (A → Z)</option>
                        <option value="title_desc">Title (Z → A)</option>
                        <option value="place_asc">Place (A → Z)</option>
                        <option value="order_asc">Custom order</option>
                    </select>
                </div>
            </div>

            <div id="galleryStatus" class="gallery-empty" style="display:none;">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading gallery…</p>
            </div>

            <div id="galleryGrid" class="gallery-grid"></div>
        </section>
    </main>

    <!-- Lightbox -->
    <div class="gallery-lightbox" id="galleryLightbox" role="dialog" aria-modal="true">
        <button class="lb-close" id="lbClose" aria-label="Close"><i class="fas fa-times"></i></button>
        <button class="lb-prev"  id="lbPrev"  aria-label="Previous"><i class="fas fa-chevron-left"></i></button>
        <button class="lb-next"  id="lbNext"  aria-label="Next"><i class="fas fa-chevron-right"></i></button>
        <img id="lbImage" alt="">
        <div class="lb-caption" id="lbCaption" style="display:none;"></div>
    </div>

    <script src="js/dataStore.js?v=17"></script>
    <script src="js/gallery.js?v=3"></script>
    <script src="js/script.js?v=30"></script>
    <script src="js/gallery-page.js?v=1"></script>
    <script src="js/user-menu.js?v=8"></script>
</body>
</html>
